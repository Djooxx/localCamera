<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动设备监控摄像头</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        #container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        video { width: 100%; max-width: 640px; border: 1px solid #ccc; margin-bottom: 10px; background-color: #000; border-radius: 4px;}
        button { padding: 10px 15px; margin-right: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #startButton { background-color: #28a745; color: white; }
        #stopButton { background-color: #dc3545; color: white; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; }
        .info { color: #555; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>
<div id="container">
    <h1>监控摄像头 (iOS/PC)</h1>
    <video id="liveVideo" autoplay muted playsinline></video>
    <div>
        <button id="startButton">开始录制</button>
        <button id="switchButton">切换摄像头</button>
        <button id="stopButton" disabled>停止录制</button>
    </div>
    <div id="status">状态: 空闲</div>
    <div class="info" id="formatInfo">格式侦测中...</div>
</div>

<script>
    const videoElement = document.getElementById('liveVideo');
    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');
    const statusElement = document.getElementById('status');
    const formatInfo = document.getElementById('formatInfo');

    const WS_URL = "{{ ws_address }}";
    const CLIENT_SEGMENT_DURATION_SECONDS = 60;

    let mediaStream;
    let mediaRecorder;
    let webSocket;
    let segmentIntervalId = null;
    let isUserStopping = false;
    let wakeLock = null;
    let autoReconnectTimer = null;

    let currentFacingMode = 'user'; // 'user' 为前置, 'environment' 为后置
    const switchButton = document.getElementById('switchButton');

    // 1. 动态获取最合适的录制格式 (优先iOS支持的MP4)
    function getBestMimeType() {
        const types = [
            { mime: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"', ext: '.mp4' },
            { mime: 'video/mp4', ext: '.mp4' },
            { mime: 'video/webm; codecs="h264, opus"', ext: '.webm' },
            { mime: 'video/webm; codecs="vp8, opus"', ext: '.webm' }
        ];
        for (let t of types) {
            if (window.MediaRecorder && MediaRecorder.isTypeSupported(t.mime)) {
                return t;
            }
        }
        return { mime: '', ext: '.webm' }; // Fallback
    }

    const bestFormat = getBestMimeType();
    formatInfo.textContent = `当前录制格式: ${bestFormat.ext.toUpperCase()} (MIME: ${bestFormat.mime || 'Default'})`;

    // 2. 请求屏幕常亮防休眠 (Wake Lock)
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('屏幕已锁定常亮');
            } catch (err) {
                console.error('防休眠锁定失败:', err.name, err.message);
            }
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    // 切换摄像头逻辑
    switchButton.addEventListener('click', async () => {
        currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
        statusElement.textContent = `状态: 正在切换至 ${currentFacingMode === 'user' ? '前置' : '后置'}...`;

        if (mediaStream) {
            // 如果正在录制，需要先停止当前的流
            const wasRecording = (mediaRecorder && mediaRecorder.state === "recording");

            // 停止旧轨道
            mediaStream.getTracks().forEach(track => track.stop());

            // 重新启动新配置的摄像头
            await startRecording();
        }
    });


    async function startRecording() {
        if (autoReconnectTimer) clearTimeout(autoReconnectTimer);
        isUserStopping = false;

        statusElement.textContent = '状态: 请求摄像头...';
        try {
            // --- 核心修改：提升质量 & 强制前/后置 ---
            const constraints = {
                video: {
                    // 使用 exact 强制要求，如果硬件不支持 60fps 会报错，方便调试
                    facingMode: { exact: currentFacingMode },
                    width: { exact: 1920 },
                    height: { exact: 1080 },
                    frameRate: { ideal: 60, min: 30 } // 尽量 60，最低 30
                },
                audio: true
            };

            mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = mediaStream;

            // 如果 WebSocket 没连，则连接；如果已连接，则重启录制器
            if (!webSocket || webSocket.readyState !== WebSocket.OPEN) {
                connectWebSocket();
            } else {
                // 切换摄像头时，发送一个分段信号给服务器，并重启录像机
                webSocket.send(JSON.stringify({type: "new_segment_signal"}));
                startNewMediaRecorderInstance();
            }

            requestWakeLock();
            startButton.disabled = true;
            stopButton.disabled = false;
            statusElement.textContent = `状态: ${currentFacingMode === 'user' ? '前置' : '后置'} 1080p 录制中`;

        } catch (err) {
            console.error(err);
            statusElement.textContent = `错误: 切换失败。设备可能不支持此参数 (${err.message})`;
            // 如果 exact 模式报错（比如后置确实不支持60帧），这里可以做个降级处理
        }
    }

    function connectWebSocket() {
        if (webSocket && webSocket.readyState === WebSocket.OPEN) return;

        webSocket = new WebSocket(WS_URL);

        webSocket.onopen = () => {
            statusElement.textContent = '状态: 已连接，开始录制...';
            // 告诉服务器我们当前使用的是 MP4 还是 WebM
            webSocket.send(JSON.stringify({ type: "init", extension: bestFormat.ext }));
            startNewMediaRecorderInstance();
        };

        webSocket.onclose = () => {
            statusElement.textContent = '状态: 服务器断开';
            cleanUpRecordingResources(true);

            // 4. 断线自动重连机制
            if (!isUserStopping) {
                statusElement.textContent = '状态: 掉线，5秒后自动重连...';
                autoReconnectTimer = setTimeout(startRecording, 5000);
            }
        };

        webSocket.onerror = (e) => {
            console.error("WebSocket Error", e);
            if (webSocket) webSocket.close();
        };
    }

    function startNewMediaRecorderInstance() {
        if (!mediaStream || !webSocket || webSocket.readyState !== WebSocket.OPEN) return;

        // 设置录制参数：限制码率
        const options = bestFormat.mime ? {
            mimeType: bestFormat.mime,
            videoBitsPerSecond: 15000000,
            audioBitsPerSecond: 320000
        } : {};

        try {
            mediaRecorder = new MediaRecorder(mediaStream, options);
        } catch (e) {
            statusElement.textContent = `错误: 录像机初始化失败 ${e.message}`;
            cleanUpRecordingResources(true);
            return;
        }

        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0 && webSocket.readyState === WebSocket.OPEN) {
                webSocket.send(event.data);
            }
        };

        mediaRecorder.onstop = () => {
            if (!isUserStopping && webSocket.readyState === WebSocket.OPEN) {
                webSocket.send(JSON.stringify({type: "new_segment_signal"}));
                startNewMediaRecorderInstance();
            } else {
                cleanUpRecordingResources(false);
            }
        };

        // 每秒发送一次数据块
        mediaRecorder.start(1000);

        if (segmentIntervalId) clearInterval(segmentIntervalId);
        segmentIntervalId = setInterval(() => {
            if (mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        }, CLIENT_SEGMENT_DURATION_SECONDS * 1000);
    }

    function stopRecording() {
        isUserStopping = true;
        if (autoReconnectTimer) clearTimeout(autoReconnectTimer);
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        } else {
            cleanUpRecordingResources(true);
        }
    }

    function cleanUpRecordingResources(closeWS) {
        if (segmentIntervalId) clearInterval(segmentIntervalId);
        if (mediaRecorder) {
            mediaRecorder.onstop = null;
            if(mediaRecorder.state === "recording") mediaRecorder.stop();
        }
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());

        videoElement.srcObject = null;
        releaseWakeLock();

        if (closeWS && webSocket && webSocket.readyState !== WebSocket.CLOSED) {
            webSocket.close();
        }

        if (isUserStopping) {
            startButton.disabled = false;
            stopButton.disabled = true;
            statusElement.textContent = '状态: 闲置';
        }
    }

    startButton.addEventListener('click', startRecording);
    stopButton.addEventListener('click', stopRecording);
    window.addEventListener('beforeunload', () => stopRecording());
</script>
</body>
</html>
